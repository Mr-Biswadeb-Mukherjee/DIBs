name: Update Sonar Badges

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Sonar Metrics
        run: |
          curl -u "${{ secrets.SONAR_TOKEN }}:" \
          "https://sonarcloud.io/api/measures/component?component=Mr-Biswadeb-Mukherjee_Infermal_v2&metricKeys=alert_status,security_rating,reliability_rating,sqale_rating" \
          -o sonar.json

      - name: Parse JSON
        run: |
          sudo apt-get install -y jq

          QUALITY=$(jq -r '.component.measures[] | select(.metric=="alert_status") | .value' sonar.json)
          SECURITY=$(jq -r '.component.measures[] | select(.metric=="security_rating") | .value' sonar.json)
          RELIABILITY=$(jq -r '.component.measures[] | select(.metric=="reliability_rating") | .value' sonar.json)
          MAINTAINABILITY=$(jq -r '.component.measures[] | select(.metric=="sqale_rating") | .value' sonar.json)

          echo "QUALITY=$QUALITY" >> $GITHUB_ENV
          echo "SECURITY=$SECURITY" >> $GITHUB_ENV
          echo "RELIABILITY=$RELIABILITY" >> $GITHUB_ENV
          echo "MAINTAINABILITY=$MAINTAINABILITY" >> $GITHUB_ENV

      - name: Generate badge JSON
        run: |
          mkdir -p badges

          echo "{\"schemaVersion\":1,\"label\":\"Quality Gate\",\"message\":\"$QUALITY\"}" > badges/quality.json
          echo "{\"schemaVersion\":1,\"label\":\"Security\",\"message\":\"$SECURITY\"}" > badges/security.json
          echo "{\"schemaVersion\":1,\"label\":\"Reliability\",\"message\":\"$RELIABILITY\"}" > badges/reliability.json
          echo "{\"schemaVersion\":1,\"label\":\"Maintainability\",\"message\":\"$MAINTAINABILITY\"}" > badges/maintainability.json

      - name: Commit badges
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add badges/
          git commit -m "Update Sonar badges" || echo "No changes"
          git push